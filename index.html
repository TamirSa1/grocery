<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>רשימת קניות</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100dvh; }
    .app { max-width: 480px; margin: 0 auto; padding: 0 0 7rem; }

    .header { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #e5e5e2; padding: 1rem 1.25rem 0.75rem; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
    .header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .progress-label { font-size: 13px; color: #888; font-variant-numeric: tabular-nums; }
    .progress-track { height: 5px; background: #e5e5e2; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #1d9e75; border-radius: 3px; transition: width 0.35s ease; width: 0%; }

    .sync-bar { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aaa; padding: 0.4rem 1.25rem 0; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.3s; }
    .sync-dot.connected { background: #1d9e75; }
    .sync-dot.error { background: #e24b4a; }

    .done-banner { display: none; margin: 1rem 1.25rem 0; padding: 10px 14px; background: #e1f5ee; color: #085041; border-radius: 10px; font-size: 14px; text-align: center; }

    .loading { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 15px; }
    .spinner { width: 28px; height: 28px; border: 3px solid #e5e5e2; border-top-color: #1d9e75; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .category { margin-top: 1.25rem; padding: 0 1.25rem; }
    .cat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }

    .item { display: flex; align-items: center; gap: 10px; padding: 10px 13px; background: #fff; border: 1px solid #e8e8e5; border-radius: 10px; margin-bottom: 6px; -webkit-tap-highlight-color: transparent; }
    .item.done { opacity: 0.45; }
    .item.done .item-name { text-decoration: line-through; color: #999; }

    .cb { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; cursor: pointer; }
    .item.done .cb { background: #1d9e75; border-color: #1d9e75; }
    .cb svg { display: none; width: 13px; height: 13px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .item.done .cb svg { display: block; }

    .item-name { flex: 1; font-size: 15px; cursor: pointer; }

    .qty-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #ddd; background: #f5f5f3; font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; transition: background 0.12s; }
    .qty-btn:hover { background: #e8e8e5; }
    .qty-num { font-size: 15px; font-weight: 500; min-width: 20px; text-align: center; }

    .item-del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 20px; line-height: 1; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
    .item-del:hover { color: #e24b4a; background: #fdf0f0; }

    .add-section { position: fixed; bottom: 0; right: 0; left: 0; background: #fff; border-top: 1px solid #e5e5e2; padding: 0.6rem 1rem; max-width: 480px; margin: 0 auto; }
    .add-row { display: flex; gap: 8px; align-items: center; }
    .add-name { flex: 1; padding: 10px 13px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #f8f8f6; color: #1a1a1a; outline: none; min-width: 0; }
    .add-name:focus { border-color: #1d9e75; background: #fff; }
    .add-qty-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .add-qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #ddd; background: #f5f5f3; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; }
    .add-qty-btn:hover { background: #e8e8e5; }
    .add-qty-num { font-size: 15px; font-weight: 500; min-width: 22px; text-align: center; }
    .btn-add { padding: 10px 15px; background: #1d9e75; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .btn-add:hover { background: #178f69; }
    .btn-reset { padding: 10px 12px; background: none; border: 1px solid #ddd; border-radius: 10px; font-size: 13px; color: #888; cursor: pointer; white-space: nowrap; }
    .btn-reset:hover { background: #f5f5f3; }

    .ai-hint { font-size: 12px; color: #1d9e75; padding: 3px 0 1px; min-height: 18px; }
    .empty { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 15px; }

    /* toast */
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-top">
      <h1>🛒 רשימת קניות</h1>
      <span class="progress-label" id="prog-label">0 / 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  </header>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">מתחבר...</span>
  </div>
  <div class="done-banner" id="done-banner">🎉 כל המוצרים נאספו! קנייה מוצלחת!</div>
  <main id="list-root"><div class="loading"><div class="spinner"></div>טוען רשימה...</div></main>
</div>

<div class="add-section">
  <div class="add-row">
    <input type="text" id="new-item-input" class="add-name" placeholder="הוסף מוצר..." autocomplete="off" />
    <div class="add-qty-wrap">
      <button class="add-qty-btn" id="add-qty-minus">−</button>
      <span class="add-qty-num" id="add-qty-num">1</span>
      <button class="add-qty-btn" id="add-qty-plus">+</button>
    </div>
    <button class="btn-add" id="btn-add">הוסף</button>
    <button class="btn-reset" id="btn-reset">אפס</button>
  </div>
  <div class="ai-hint" id="ai-hint"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, remove, get }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBIkJqv-zxchVNIBKJ9ofMdxlbn8sMz3Do",
    authDomain: "grocery-list-a7281.firebaseapp.com",
    databaseURL: "https://grocery-list-a7281-default-rtdb.firebaseio.com",
    projectId: "grocery-list-a7281",
    storageBucket: "grocery-list-a7281.firebasestorage.app",
    messagingSenderId: "843518553895",
    appId: "1:843518553895:web:776c1b03d336682f414302"
  };

  const DEFAULT_ITEMS = [
    { id: "item1", name: "נייר טואלט",       qty: 1, cat: "ניקיון הבית",  done: false },
    { id: "item2", name: "מלפפונים",          qty: 6, cat: "פירות וירקות", done: false },
    { id: "item3", name: "פלפל אדום",         qty: 3, cat: "פירות וירקות", done: false },
    { id: "item4", name: "פלפל כתום / צהוב", qty: 3, cat: "פירות וירקות", done: false },
    { id: "item5", name: "עגבניות",           qty: 3, cat: "פירות וירקות", done: false },
    { id: "item6", name: "נקטרינות",          qty: 2, cat: "פירות וירקות", done: false },
    { id: "item7", name: "בננות",             qty: 4, cat: "פירות וירקות", done: false },
    { id: "item8", name: "יוגורט פרו תות",   qty: 4, cat: "מוצרי חלב",   done: false },
  ];

  // ── Category dictionary (ordered = supermarket aisle order) ──
  const CAT_RULES = [
    { cat: "פירות וירקות", keywords: [
      "תפוח","תפוז","בננה","ענבים","ענב","אגס","מנגו","אבטיח","מלון","תות",
      "אפרסק","נקטרינה","שזיף","דובדבן","לימון","אשכולית","פומלה","קיווי",
      "אנונה","רימון","תמר","ליים","פפאיה","פסיפלורה","אננס","קוקוס",
      "צימוקים","פרי יבש","פירות יבשים","חמוציות","משמש",
      "עגבניה","עגבניות","מלפפון","פלפל","חסה","גזר","בצל","שום",
      "תפוח אדמה","בטטה","קישוא","זוקיני","חציל","ברוקולי","כרובית","כרוב",
      "תירס","שעועית ירוקה","אפונה ירוקה","סלרי","פטרוזיליה","כוסברה",
      "נענע","בזיליקום","רוקט","תרד","מנגולד","כרישה","פטריה","פטריות",
      "אבוקדו","ארטישוק","אספרגוס","צנון","צנונית","לפת","קולרבי",
      "שמיר","עירית","דלעת","דלורית","ג'ינג'ר","כורכום טרי","לוף"
    ]},
    { cat: "מוצרי חלב", keywords: [
      "חלב","יוגורט","גבינה","גבינת","קוטג'","קוטג","שמנת","חמאה",
      "מרגרינה","אשל","קפיר","ריקוטה","מוצרלה","פרמזן",
      "גבינה צהובה","עמק","גלבוע","בולגרית","פטה","גאודה","צ'דר","ברי","קממבר",
      "מסקרפונה","לאבנה","דנונה","תנובה","שטראוס","יטבתה","טרה","מילקי","מעדן"
    ]},
    { cat: "ביצים", keywords: [
      "ביצה","ביצים","תבנית ביצים","ביצי חופש","ביצים אורגניות"
    ]},
    { cat: "בשר, עוף ודגים", keywords: [
      "עוף","חזה עוף","ירך עוף","כנפיים","שוקיים","פרגית","קורקבנים","כבד עוף",
      "בשר","בקר","בשר טחון","סטייק","אנטריקוט","פילה","צלעות","קבב","המבורגר",
      "כבש","טלה","אסאדו","שפונדרה","צלי","גולש",
      "נקניק","נקניקיה","נקניקיות","סלמי","פסטרמה","קורנביף",
      "דג","סלמון","טונה טרייה","מוסר","דניס","בורי","קרפיון","לברק",
      "שרימפס","קלמרי","הליבוט","בקלה","פורל","ברמונדי","אמנון","פילה דג"
    ]},
    { cat: "לחם ומאפים", keywords: [
      "לחם","פיתה","פיתות","בגט","חלה","לחמניה","לחמניות","עוגה","עוגיות",
      "קרקר","מצה","מצות","טוסט","פוקצ'ה","ג'חנון","מלאווח","בורקס",
      "קיש","שטרודל","רוגלך","מאפה","בייגלה","לאפה","דונאטס",
      "מאפינס","בראוניז","פנקייק","פירורי לחם"
    ]},
    { cat: "קפואים", keywords: [
      "גלידה","ארטיק","קרטיב","סורבה","פיצה קפואה",
      "אפונה קפואה","תירס קפוא","שניצל קפוא","ירקות קפואים","צ'יפס קפוא",
      "בצק עלים קפוא","אדממה","דג קפוא","פירות ים קפואים","קפוא","קפואים"
    ]},
    { cat: "מוצרי יסוד ושימורים", keywords: [
      "פחית טונה","טונה","עגבניות מרוסקות","רסק עגבניות",
      "תירס בשימורים","זיתים","חמוצים","מלפפונים חמוצים","טחינה","חומוס",
      "ריבה","דבש","סילאן","מייפל","חרדל","מיונז","קטשופ","חמאת בוטנים",
      "שמן זית","שמן קנולה","שמן חמניות","שמן קוקוס","חומץ","בלסמי",
      "רוטב פסטה","רוטב עגבניות","רוטב סויה","טריאקי",
      "פסטה","ספגטי","מקרוני","פנה","פתיתים","נודלס","אורז","קוסקוס","בורגול",
      "עדשים","חיטה","כוסמת","קינואה","שיבולת שועל","שעועית יבשה","גרגירי חומוס",
      "קמח","סוכר","מלח","שמרים","אבקת אפייה","סודה לשתייה","קקאו","שוקולד מריר",
      "פלפל שחור","כמון","פפריקה","קינמון","כורכום","זעתר","אבקת מרק","תבלין",
      "קורנפלקס","גרנולה","דגני בוקר","מוזלי",
      "אגוזים","שקדים","פיסטוק","קשיו","בוטנים","גרעינים","צנובר","שומשום","שימורים"
    ]},
    { cat: "חטיפים וממתקים", keywords: [
      "במבה","ביסלי","תפוצ'יפס","צ'יפס","דוריטוס","אפרופו","חטיף","פופקורן",
      "שוקולד","סוכריות","מסטיק","מרשמלו","וופלים","ממתק","קרמבו","בר שוקולד","פראלינה"
    ]},
    { cat: "משקאות", keywords: [
      "מים מינרליים","שישיית מים","מיץ","קולה","פאנטה","ספרייט","סודה","גזוז","בירה",
      "יין","שמפניה","קאווה","וודקה","ויסקי","ברנדי","רום","טקילה","עראק",
      "קפה","נס קפה","תה","תיונים","שוקו","תרכיז","משקה אנרגיה","רד בול",
      "קפסולות קפה","חלב שקדים","חלב שיבולת שועל","חלב סויה","משקה"
    ]},
    { cat: "ניקיון הבית", keywords: [
      "נייר טואלט","מגבות נייר","נייר סופג","טישו","מפיות","נייר אפייה","ניילון נצמד",
      "שקיות זבל","נייר כסף","רדיד אלומיניום","חד פעמי","כוסות חד פעמי","צלחות חד פעמי",
      "סבון כלים","נוזל כלים","אקונומיקה","מסיר שומנים","טבליות מדיח","נוזל רצפות",
      "אבקת כביסה","נוזל כביסה","מרכך כביסה","קפסולות כביסה","מסיר כתמים",
      "חומר הדברה","מנקה חלונות","וינדקס","מגב","סמרטוט","מטאטא",
      "ספוג","כפפות","מברשת אסלה","סבון","ניקוי"
    ]},
    { cat: "פארם וטואלטיקה", keywords: [
      "סבון גוף","תחליב רחצה","סבון ידיים","שמפו","מרכך שיער","דאודורנט",
      "מברשת שיניים","משחת שיניים","חוט דנטלי","מי פה","תחבושות היגייניות","טמפונים",
      "קרם פנים","קרם גוף","קרם ידיים","סרום","אפטר שייב","קצף גילוח","סכין גילוח",
      "מסיר איפור","קונסילר","שפתון","אודם","מסקרה","לק ציפורניים","מסיר לק","בושם","קרם הגנה",
      "ויטמינים","אומגה","מגנזיום","פרוביוטיקה","אקמול","נורופן","אדוויל",
      "פלסטרים","תחבושת","מד חום","קונדומים","חיתולים","מגבונים"
    ]}
  ];

  // סדר הקטגוריות לפי מיקום פיזי בסופר + שונות תמיד בסוף
  const ORDERED_CATS = [...CAT_RULES.map(r => r.cat), "שונות"];

  // ── Scoring categorizer ──
  function detectCategory(itemName) {
    const clean = itemName.trim();
    let best = { cat: "שונות", score: 0 };
    for (const rule of CAT_RULES) {
      for (const kw of rule.keywords) {
        if (clean === kw) return rule.cat;
        if (clean.includes(kw)) {
          const score = kw.length;
          if (score > best.score) best = { cat: rule.cat, score };
        }
      }
    }
    return best.cat;
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  const fbApp = initializeApp(firebaseConfig);
  const db = getDatabase(fbApp);
  const itemsRef = ref(db, "grocery/items");

  const syncDot = document.getElementById("sync-dot");
  const syncLabel = document.getElementById("sync-label");
  function setConnected(ok) {
    syncDot.className = "sync-dot " + (ok ? "connected" : "error");
    syncLabel.textContent = ok ? "מסונכרן" : "בעיית חיבור";
  }

  get(itemsRef).then(snap => {
    if (!snap.exists()) {
      const seed = {};
      DEFAULT_ITEMS.forEach(it => { seed[it.id] = it; });
      set(itemsRef, seed);
    }
  });

  // שמירת snapshot נוכחי לבדיקת כפילויות
  let currentItems = [];
  onValue(itemsRef, snap => {
    setConnected(true);
    currentItems = Object.values(snap.val() || {});
    render(currentItems);
  }, () => setConnected(false));

  // ── Render ──
  function render(items) {
    const total = items.length;
    const doneCount = items.filter(i => i.done).length;
    document.getElementById("prog-label").textContent = doneCount + " / " + total;
    document.getElementById("prog-fill").style.width = (total ? Math.round(doneCount/total*100) : 0) + "%";
    document.getElementById("done-banner").style.display = (total > 0 && doneCount === total) ? "block" : "none";

    const root = document.getElementById("list-root");
    root.innerHTML = "";
    if (total === 0) { root.innerHTML = '<div class="empty">הרשימה ריקה — הוסף מוצרים למטה</div>'; return; }

    // קיבוץ לפי קטגוריה
    const cats = {};
    items.sort((a,b) => a.done === b.done ? 0 : a.done ? 1 : -1)
         .forEach(it => { if (!cats[it.cat]) cats[it.cat]=[]; cats[it.cat].push(it); });

    // מיון קטגוריות לפי סדר הסופר, שונות תמיד בסוף
    const sortedCatKeys = Object.keys(cats)
      .sort((a, b) => {
        const ai = ORDERED_CATS.indexOf(a);
        const bi = ORDERED_CATS.indexOf(b);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });

    sortedCatKeys.forEach(cat => {
      const catItems = cats[cat];
      const sec = document.createElement("section");
      sec.className = "category";
      sec.innerHTML = '<div class="cat-label">' + esc(cat) + '</div>';

      catItems.forEach(it => {
        const div = document.createElement("div");
        div.className = "item" + (it.done ? " done" : "");
        const qty = Number(it.qty) || 1;
        div.innerHTML =
          '<div class="cb"><svg viewBox="0 0 14 12"><polyline points="1,6 5,10 13,1"/></svg></div>' +
          '<span class="item-name">' + esc(it.name) + '</span>' +
          '<div class="qty-controls">' +
            '<button class="qty-btn" data-action="minus">−</button>' +
            '<span class="qty-num">' + qty + '</span>' +
            '<button class="qty-btn" data-action="plus">+</button>' +
          '</div>' +
          '<button class="item-del">×</button>';

        const toggleDone = () => update(ref(db, "grocery/items/" + it.id), { done: !it.done });
        div.querySelector(".cb").addEventListener("click", toggleDone);
        div.querySelector(".item-name").addEventListener("click", toggleDone);

        div.querySelectorAll(".qty-btn").forEach(btn => {
          btn.addEventListener("click", e => {
            e.stopPropagation();
            update(ref(db, "grocery/items/" + it.id), { qty: Math.max(1, qty + (btn.dataset.action === "plus" ? 1 : -1)) });
          });
        });

        div.querySelector(".item-del").addEventListener("click", e => {
          e.stopPropagation();
          remove(ref(db, "grocery/items/" + it.id));
        });

        sec.appendChild(div);
      });
      root.appendChild(sec);
    });
  }

  // ── Add item ──
  let addQty = 1;
  const addQtyNum = document.getElementById("add-qty-num");
  const aiHint = document.getElementById("ai-hint");
  let detectedCat = "שונות";

  document.getElementById("add-qty-minus").addEventListener("click", () => { addQty = Math.max(1, addQty-1); addQtyNum.textContent = addQty; });
  document.getElementById("add-qty-plus").addEventListener("click",  () => { addQty++; addQtyNum.textContent = addQty; });

  document.getElementById("new-item-input").addEventListener("input", e => {
    const val = e.target.value.trim();
    if (val.length < 2) { aiHint.textContent = ""; detectedCat = "שונות"; return; }
    detectedCat = detectCategory(val);
    aiHint.textContent = detectedCat !== "שונות" ? "📂 " + detectedCat : "";
  });

  function addItem() {
    const inp = document.getElementById("new-item-input");
    const val = inp.value.trim();
    if (!val) return;
    if (detectedCat === "שונות") detectedCat = detectCategory(val);

    // בדיקת כפילות — אם המוצר כבר קיים, פשוט מחברים כמות
    const existing = currentItems.find(it => it.name.trim() === val);
    if (existing) {
      const newQty = (Number(existing.qty) || 1) + addQty;
      update(ref(db, "grocery/items/" + existing.id), { qty: newQty, done: false });
      showToast("✓ עדכון כמות: " + val + " → " + newQty);
    } else {
      const id = "item_" + Date.now();
      set(ref(db, "grocery/items/" + id), { id, name: val, qty: addQty, cat: detectedCat, done: false });
    }

    inp.value = "";
    addQty = 1;
    addQtyNum.textContent = "1";
    aiHint.textContent = "";
    detectedCat = "שונות";
    // לא מחזירים focus — נוח יותר בטלפון
  }

  document.getElementById("btn-add").addEventListener("click", addItem);
  document.getElementById("new-item-input").addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });

  document.getElementById("btn-reset").addEventListener("click", () => {
    if (!confirm("לאפס את כל הסימונים?")) return;
    get(itemsRef).then(snap => {
      if (!snap.exists()) return;
      const updates = {};
      Object.keys(snap.val()).forEach(k => { updates[k + "/done"] = false; });
      update(itemsRef, updates);
    });
  });

  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
